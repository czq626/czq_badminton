<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一拍定胜负</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="start-screen" id="startScreen" aria-label="一拍定胜负开始界面">
        <div class="start-copy">
          <p class="eyebrow">Stick Badminton</p>
          <h1>一拍定胜负</h1>
          <p id="startSummary">选择模式，抢落点、跳扣杀，先到 7 分且领先 2 分获胜。</p>
        </div>

        <div class="start-preview" aria-hidden="true">
          <img src="./assets/generated/images/pixel-court-selected.png" alt="" />
          <div class="preview-score">
            <span>蓝队</span>
            <strong>0 : 0</strong>
            <span>红队</span>
          </div>
        </div>

        <div class="start-menu" aria-label="开局设置">
          <div class="mode-grid" aria-label="模式选择">
            <button class="mode-card active" type="button" data-match-mode="solo">
              <span class="mode-icon">1P</span>
              <strong>单人挑战</strong>
              <small>蓝队对战红队 AI</small>
            </button>
            <button class="mode-card" type="button" data-match-mode="local">
              <span class="mode-icon">2P</span>
              <strong>本地双人</strong>
              <small>同屏键盘或触控对战</small>
            </button>
            <button class="mode-card" type="button" data-match-mode="online">
              <span class="mode-icon">ROOM</span>
              <strong>房间模式</strong>
              <small>房间列表，创建或加入</small>
            </button>
          </div>

          <div class="option-grid">
            <div class="option-group" aria-label="难度选择">
              <span>难度</span>
              <div class="menu-row">
                <button class="choice active" type="button" data-difficulty="easy">休闲</button>
                <button class="choice" type="button" data-difficulty="normal">普通</button>
                <button class="choice" type="button" data-difficulty="hard">高手</button>
              </div>
            </div>
            <div class="option-group" aria-label="赛制选择">
              <span>赛制</span>
              <div class="menu-row compact">
                <button class="choice active" type="button" data-target-score="7">7分</button>
                <button class="choice" type="button" data-target-score="11">11分</button>
              </div>
            </div>
            <div class="option-group" aria-label="玩法选择">
              <span>球路</span>
              <div class="menu-row compact">
                <button class="choice active" type="button" data-style="standard">标准</button>
                <button class="choice" type="button" data-style="fun">趣味</button>
              </div>
            </div>
          </div>

          <div class="online-panel" id="onlinePanel" hidden>
            <div class="online-status" id="onlineStatus">连接房间服务后显示房间列表；离线时可本机多标签测试。</div>
            <div class="room-server-row">
              <label>
                房间服务
                <input id="roomServerInput" type="url" autocomplete="off" placeholder="ws://localhost:8787" />
              </label>
              <button id="refreshRoomsButton" type="button">刷新</button>
              <button id="createRoomButton" type="button">创建房间</button>
              <button id="resetOnlineButton" type="button">断开</button>
            </div>
            <div class="room-list" id="roomList" aria-label="房间列表">
              <div class="room-empty" id="roomEmpty">暂无可加入房间。</div>
            </div>
          </div>

          <button id="startButton" class="primary-start" type="button">开始游戏</button>
        </div>
      </section>

      <section class="game-stage hidden" id="gameStage" aria-label="比赛界面">
      <section class="game-wrap" aria-label="一拍定胜负游戏">
        <canvas id="game" width="960" height="540"></canvas>

        <div class="hud">
          <div class="score-block left">
            <span class="name">蓝队</span>
            <strong id="leftScore">0</strong>
          </div>
          <div class="center-panel">
            <span id="modeLabel">单人模式</span>
            <button id="modeButton" type="button" title="切换单双人">切换</button>
            <button id="assistButton" type="button" title="落点辅助开关">辅助</button>
            <button id="soundButton" type="button" title="音效开关">音效</button>
            <button id="pauseButton" type="button" title="暂停/继续">暂停</button>
            <button id="resetButton" type="button" title="重新开局">重开</button>
          </div>
          <div class="score-block right">
            <span class="name">红队</span>
            <strong id="rightScore">0</strong>
          </div>
        </div>

        <div class="status-strip" id="statusStrip">7分制 | 蓝队发球 | 休闲 | 标准</div>

        <div class="overlay" id="overlay">
          <div class="panel">
            <h1>一拍定胜负</h1>
            <p id="overlayText">抢落点、跳扣杀，先到 7 分获胜。</p>
            <button id="overlayActionButton" type="button">继续</button>
          </div>
        </div>
      </section>

      <section class="touch-controls" aria-label="触屏操作">
        <div class="touch-side">
          <span>蓝队</span>
          <div class="touch-pad">
            <button type="button" data-hold="a">←</button>
            <button type="button" data-tap="w">跳</button>
            <button type="button" data-hold="d">→</button>
          </div>
          <div class="touch-pad actions">
            <button type="button" data-tap="j">挥拍</button>
            <button type="button" data-tap="k">捞/扣</button>
            <button type="button" data-hold="s">短球</button>
          </div>
        </div>
        <div class="touch-side">
          <span>红队</span>
          <div class="touch-pad">
            <button type="button" data-hold="ArrowLeft">←</button>
            <button type="button" data-tap="ArrowUp">跳</button>
            <button type="button" data-hold="ArrowRight">→</button>
          </div>
          <div class="touch-pad actions">
            <button type="button" data-tap="1">挥拍</button>
            <button type="button" data-tap="2">捞/扣</button>
            <button type="button" data-hold="ArrowDown">短球</button>
          </div>
        </div>
      </section>

      <section class="controls">
        <div>
          <h2>蓝队</h2>
          <p><kbd>A</kbd><kbd>D</kbd> 移动 <kbd>W</kbd> 跳跃 <kbd>J</kbd> 挥拍 <kbd>K</kbd> 地捞/空扣 <kbd>S</kbd> 网前小球</p>
        </div>
        <div>
          <h2>红队</h2>
          <p><kbd>←</kbd><kbd>→</kbd> 移动 <kbd>↑</kbd> 跳跃 <kbd>1</kbd> 挥拍 <kbd>2</kbd> 地捞/空扣 <kbd>↓</kbd> 网前小球</p>
        </div>
      </section>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
